<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSX Export</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }</style>
</head>
<body>
    <div id="root" style="height: 100%; overflow: auto;"></div>
    <script>
        const jsxCode = `import { useState, useEffect, useRef, useCallback } from "react";

// Known Riemann zero imaginary parts (first 20)
const RIEMANN_ZEROS = [
  14.1347, 21.0220, 25.0109, 30.4249, 32.9351,
  37.5862, 40.9187, 43.3271, 48.0052, 49.7738,
  52.9703, 56.4462, 59.3470, 60.8318, 65.1125,
  67.0798, 69.5465, 72.0672, 75.7047, 77.1448
];

// Λ_Collatz(n): log2 if n even, log3 if n≡1 mod 6 (n>1), both if both, 0 otherwise
function lambdaCollatz(n) {
  let val = 0;
  if (n % 2 === 0) val += Math.log(2);
  if (n > 1 && n % 6 === 1) val += Math.log(3);
  return val;
}

// R(n) = π - (n/2)sin(2π/n)
function R(n) {
  if (n < 2) return 1;
  return Math.PI - (n / 2) * Math.sin((2 * Math.PI) / n);
}

// Compute D(σ + it) = Σ Λ(n) * n^{-σ} * e^{-it·log(n)} / R(n)^β
function computeD(t, sigma, beta, N) {
  let re = 0, im = 0;
  for (let n = 2; n <= N; n++) {
    const lam = lambdaCollatz(n);
    if (lam === 0) continue;
    const rn = R(n);
    if (rn <= 0) continue;
    const amp = lam * Math.pow(n, -sigma) / Math.pow(rn, beta);
    const phase = -t * Math.log(n);
    re += amp * Math.cos(phase);
    im += amp * Math.sin(phase);
  }
  return { re, im, abs: Math.sqrt(re * re + im * im), arg: Math.atan2(im, re) };
}

// Precompute series along t axis
function computeSeries(tMin, tMax, steps, sigma, beta, N) {
  const dt = (tMax - tMin) / steps;
  const result = [];
  for (let i = 0; i <= steps; i++) {
    const t = tMin + i * dt;
    const d = computeD(t, sigma, beta, N);
    result.push({ t, ...d });
  }
  return result;
}

// Find local minima of |D| (zero candidates)
function findMinima(series, threshold = 0.3) {
  const minima = [];
  const globalMax = Math.max(...series.map(p => p.abs));
  for (let i = 1; i < series.length - 1; i++) {
    if (
      series[i].abs < series[i - 1].abs &&
      series[i].abs < series[i + 1].abs &&
      series[i].abs < globalMax * threshold
    ) {
      minima.push(series[i].t);
    }
  }
  return minima;
}

export default function CollatzZetaExplorer() {
  const canvasRe = useRef(null);
  const canvasArg = useRef(null);
  const canvasAbs = useRef(null);

  const [N, setN] = useState(200);
  const [beta, setBeta] = useState(0.5);
  const [sigma, setSigma] = useState(0.5);
  const [tMax, setTMax] = useState(80);
  const [steps] = useState(1200);
  const [series, setSeries] = useState([]);
  const [minima, setMinima] = useState([]);
  const [computing, setComputing] = useState(false);
  const [matchScore, setMatchScore] = useState(null);

  const run = useCallback(() => {
    setComputing(true);
    setTimeout(() => {
      const s = computeSeries(1, tMax, steps, sigma, beta, N);
      setSeries(s);
      const m = findMinima(s);
      setMinima(m);

      // Score: for each Riemann zero ≤ tMax, find nearest minimum
      const zeros = RIEMANN_ZEROS.filter(z => z <= tMax);
      if (zeros.length > 0 && m.length > 0) {
        let totalErr = 0;
        zeros.forEach(z => {
          const nearest = m.reduce((best, t) => Math.abs(t - z) < Math.abs(best - z) ? t : best, m[0]);
          totalErr += Math.abs(nearest - z);
        });
        setMatchScore((totalErr / zeros.length).toFixed(3));
      } else {
        setMatchScore(null);
      }

      setComputing(false);
    }, 10);
  }, [N, beta, sigma, tMax, steps]);

  useEffect(() => { run(); }, []);

  // Draw canvases
  useEffect(() => {
    if (!series.length) return;

    const W = 700, H = 110;
    const PAD = { left: 40, right: 10, top: 10, bottom: 20 };
    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top - PAD.bottom;
    const tMin = 1;

    const tToX = t => PAD.left + ((t - tMin) / (tMax - tMin)) * plotW;
    const zeros = RIEMANN_ZEROS.filter(z => z <= tMax);

    // Helper: draw grid + zero markers on any canvas ctx
    function drawBase(ctx) {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#0a0e1a";
      ctx.fillRect(0, 0, W, H);

      // Zero markers
      zeros.forEach(z => {
        const x = tToX(z);
        ctx.strokeStyle = "rgba(255,80,80,0.25)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(x, PAD.top);
        ctx.lineTo(x, H - PAD.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // Minima markers
      minima.forEach(m => {
        const x = tToX(m);
        ctx.strokeStyle = "rgba(80,255,180,0.4)";
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 4]);
        ctx.beginPath();
        ctx.moveTo(x, PAD.top);
        ctx.lineTo(x, H - PAD.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // Axes
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(PAD.left, H - PAD.bottom);
      ctx.lineTo(W - PAD.right, H - PAD.bottom);
      ctx.stroke();
    }

    // --- Re(D) panel ---
    const ctxRe = canvasRe.current?.getContext("2d");
    if (ctxRe) {
      drawBase(ctxRe);
      const vals = series.map(p => p.re);
      const maxV = Math.max(...vals.map(Math.abs), 1e-9);
      const yMid = PAD.top + plotH / 2;
      const yScale = (plotH / 2) * 0.85;

      // Zero line
      ctxRe.strokeStyle = "rgba(255,255,255,0.1)";
      ctxRe.lineWidth = 1;
      ctxRe.beginPath();
      ctxRe.moveTo(PAD.left, yMid);
      ctxRe.lineTo(W - PAD.right, yMid);
      ctxRe.stroke();

      // Curve
      ctxRe.strokeStyle = "#4fc3f7";
      ctxRe.lineWidth = 1.5;
      ctxRe.beginPath();
      series.forEach((p, i) => {
        const x = tToX(p.t);
        const y = yMid - (p.re / maxV) * yScale;
        i === 0 ? ctxRe.moveTo(x, y) : ctxRe.lineTo(x, y);
      });
      ctxRe.stroke();

      ctxRe.fillStyle = "rgba(79,195,247,0.6)";
      ctxRe.font = "10px 'Courier New'";
      ctxRe.fillText("Re(D)", PAD.left, PAD.top + 10);
    }

    // --- Arg(D) panel ---
    const ctxArg = canvasArg.current?.getContext("2d");
    if (ctxArg) {
      drawBase(ctxArg);
      const yMid = PAD.top + plotH / 2;
      const yScale = (plotH / 2) * 0.85;

      ctxArg.strokeStyle = "rgba(255,255,255,0.1)";
      ctxArg.lineWidth = 1;
      ctxArg.beginPath();
      ctxArg.moveTo(PAD.left, yMid);
      ctxArg.lineTo(W - PAD.right, yMid);
      ctxArg.stroke();

      ctxArg.strokeStyle = "#ce93d8";
      ctxArg.lineWidth = 1.5;
      ctxArg.beginPath();
      series.forEach((p, i) => {
        const x = tToX(p.t);
        const y = yMid - (p.arg / Math.PI) * yScale;
        i === 0 ? ctxArg.moveTo(x, y) : ctxArg.lineTo(x, y);
      });
      ctxArg.stroke();

      ctxArg.fillStyle = "rgba(206,147,216,0.6)";
      ctxArg.font = "10px 'Courier New'";
      ctxArg.fillText("arg(D) / π", PAD.left, PAD.top + 10);
    }

    // --- |D| panel ---
    const ctxAbs = canvasAbs.current?.getContext("2d");
    if (ctxAbs) {
      drawBase(ctxAbs);
      const vals = series.map(p => p.abs);
      const maxV = Math.max(...vals, 1e-9);

      // Curve — filled
      ctxAbs.strokeStyle = "#80cbc4";
      ctxAbs.lineWidth = 1.5;
      ctxAbs.beginPath();
      series.forEach((p, i) => {
        const x = tToX(p.t);
        const y = H - PAD.bottom - (p.abs / maxV) * plotH * 0.88;
        i === 0 ? ctxAbs.moveTo(x, y) : ctxAbs.lineTo(x, y);
      });
      ctxAbs.stroke();

      ctxAbs.fillStyle = "rgba(128,203,196,0.6)";
      ctxAbs.font = "10px 'Courier New'";
      ctxAbs.fillText("|D(s)|", PAD.left, PAD.top + 10);

      // t-axis labels
      ctxAbs.fillStyle = "rgba(255,255,255,0.3)";
      ctxAbs.font = "9px 'Courier New'";
      [0, 20, 40, 60, 80].filter(v => v <= tMax).forEach(v => {
        const x = tToX(v || 1);
        ctxAbs.fillText(v, x - 4, H - 4);
      });
    }
  }, [series, minima, tMax]);

  const zeros = RIEMANN_ZEROS.filter(z => z <= tMax);

  return (
    <div style={{
      background: "#0a0e1a",
      minHeight: "100vh",
      fontFamily: "'Courier New', monospace",
      color: "#c9d1e0",
      padding: "24px",
    }}>
      {/* Header */}
      <div style={{ marginBottom: "24px", borderBottom: "1px solid rgba(255,255,255,0.08)", paddingBottom: "16px" }}>
        <div style={{ fontSize: "11px", color: "#4fc3f7", letterSpacing: "3px", marginBottom: "4px" }}>
          DYNAMICAL ZETA EXPLORER
        </div>
        <div style={{ fontSize: "20px", fontWeight: "bold", color: "#e8edf5", letterSpacing: "1px" }}>
          Z(s) = exp(Σ Λ<sub style={{fontSize:"12px"}}>Collatz</sub>(n) · n<sup style={{fontSize:"10px"}}>−s</sup> · R(n)<sup style={{fontSize:"10px"}}>−β</sup>)
        </div>
        <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)", marginTop: "4px" }}>
          Collatz mixing × geometric dust modulation · s = σ + it
        </div>
      </div>

      {/* Controls */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(4, 1fr)",
        gap: "16px",
        marginBottom: "20px",
        background: "rgba(255,255,255,0.03)",
        border: "1px solid rgba(255,255,255,0.06)",
        borderRadius: "6px",
        padding: "16px",
      }}>
        {[
          { label: "N (truncation)", val: N, set: setN, min: 50, max: 500, step: 50, unit: "" },
          { label: "β (geometric)", val: beta, set: setBeta, min: 0.1, max: 2, step: 0.05, unit: "" },
          { label: "σ (Re axis)", val: sigma, set: setSigma, min: 0.1, max: 1, step: 0.05, unit: "" },
          { label: "t max", val: tMax, set: setTMax, min: 20, max: 80, step: 5, unit: "" },
        ].map(({ label, val, set, min, max, step }) => (
          <div key={label}>
            <div style={{ fontSize: "10px", color: "rgba(255,255,255,0.4)", marginBottom: "6px", letterSpacing: "1px" }}>
              {label}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <input
                type="range" min={min} max={max} step={step} value={val}
                onChange={e => set(parseFloat(e.target.value))}
                style={{ flex: 1, accentColor: "#4fc3f7", cursor: "pointer" }}
              />
              <span style={{ fontSize: "13px", color: "#e8edf5", minWidth: "36px", textAlign: "right" }}>
                {val}
              </span>
            </div>
          </div>
        ))}
      </div>

      <button
        onClick={run}
        disabled={computing}
        style={{
          background: computing ? "rgba(79,195,247,0.2)" : "rgba(79,195,247,0.15)",
          border: "1px solid rgba(79,195,247,0.5)",
          color: "#4fc3f7",
          padding: "8px 24px",
          borderRadius: "4px",
          cursor: computing ? "wait" : "pointer",
          fontFamily: "'Courier New', monospace",
          fontSize: "12px",
          letterSpacing: "2px",
          marginBottom: "20px",
          transition: "all 0.2s",
        }}
      >
        {computing ? "COMPUTING..." : "RUN COMPUTATION"}
      </button>

      {/* Legend */}
      <div style={{ display: "flex", gap: "20px", marginBottom: "12px", fontSize: "10px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <div style={{ width: "20px", height: "2px", background: "rgba(255,80,80,0.6)", borderTop: "2px dashed rgba(255,80,80,0.5)" }} />
          <span style={{ color: "rgba(255,80,80,0.8)" }}>Riemann zeros (t = γ)</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <div style={{ width: "20px", borderTop: "2px dashed rgba(80,255,180,0.5)" }} />
          <span style={{ color: "rgba(80,255,180,0.8)" }}>|D| local minima (Z candidates)</span>
        </div>
      </div>

      {/* Canvases */}
      <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
        <canvas ref={canvasRe} width={700} height={110} style={{ display: "block", borderRadius: "4px" }} />
        <canvas ref={canvasArg} width={700} height={110} style={{ display: "block", borderRadius: "4px" }} />
        <canvas ref={canvasAbs} width={700} height={110} style={{ display: "block", borderRadius: "4px" }} />
      </div>

      {/* Stats panel */}
      <div style={{
        marginTop: "20px",
        display: "grid",
        gridTemplateColumns: "1fr 1fr",
        gap: "16px",
      }}>
        {/* Match table */}
        <div style={{
          background: "rgba(255,255,255,0.02)",
          border: "1px solid rgba(255,255,255,0.06)",
          borderRadius: "6px",
          padding: "14px",
        }}>
          <div style={{ fontSize: "10px", color: "#4fc3f7", letterSpacing: "2px", marginBottom: "10px" }}>
            ZERO ALIGNMENT (Riemann γ vs |D| minima)
          </div>
          <div style={{ maxHeight: "180px", overflowY: "auto" }}>
            <table style={{ width: "100%", fontSize: "11px", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ color: "rgba(255,255,255,0.4)", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
                  <td style={{ padding: "3px 6px" }}>γ (RH)</td>
                  <td style={{ padding: "3px 6px" }}>nearest min</td>
                  <td style={{ padding: "3px 6px" }}>|Δ|</td>
                  <td style={{ padding: "3px 6px" }}>match</td>
                </tr>
              </thead>
              <tbody>
                {zeros.map(z => {
                  const nearest = minima.length > 0
                    ? minima.reduce((b, t) => Math.abs(t - z) < Math.abs(b - z) ? t : b, minima[0])
                    : null;
                  const diff = nearest !== null ? Math.abs(nearest - z) : null;
                  const good = diff !== null && diff < 1.5;
                  return (
                    <tr key={z} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                      <td style={{ padding: "3px 6px", color: "rgba(255,100,100,0.9)" }}>{z.toFixed(4)}</td>
                      <td style={{ padding: "3px 6px", color: "rgba(80,255,180,0.9)" }}>
                        {nearest !== null ? nearest.toFixed(4) : "—"}
                      </td>
                      <td style={{ padding: "3px 6px", color: diff !== null ? (good ? "#80cbc4" : "rgba(255,200,80,0.8)") : "rgba(255,255,255,0.3)" }}>
                        {diff !== null ? diff.toFixed(3) : "—"}
                      </td>
                      <td style={{ padding: "3px 6px" }}>
                        {diff !== null ? (good ? "✓" : "~") : "—"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {matchScore && (
            <div style={{ marginTop: "10px", fontSize: "11px", color: "rgba(255,255,255,0.5)" }}>
              Mean |Δ| : <span style={{ color: "#80cbc4" }}>{matchScore}</span>
            </div>
          )}
        </div>

        {/* Info panel */}
        <div style={{
          background: "rgba(255,255,255,0.02)",
          border: "1px solid rgba(255,255,255,0.06)",
          borderRadius: "6px",
          padding: "14px",
          fontSize: "11px",
          lineHeight: "1.7",
        }}>
          <div style={{ fontSize: "10px", color: "#4fc3f7", letterSpacing: "2px", marginBottom: "10px" }}>
            PARAMETER NOTES
          </div>
          <div style={{ color: "rgba(255,255,255,0.5)" }}>
            <div style={{ marginBottom: "8px" }}>
              <span style={{ color: "#ce93d8" }}>Λ_Collatz(n)</span> = log 2 if n even;<br />
              + log 3 if n ≡ 1 (mod 6), n > 1
            </div>
            <div style={{ marginBottom: "8px" }}>
              <span style={{ color: "#4fc3f7" }}>R(n)</span> = π − (n/2)·sin(2π/n)<br />
              geometric dust from regular n-gon area
            </div>
            <div style={{ marginBottom: "8px" }}>
              <span style={{ color: "#80cbc4" }}>β = 0.5</span> → R(n)^β ~ n^{-1} shifts<br />
              convergence abscissa by 1 (Perron at s=1)
            </div>
            <div>
              <span style={{ color: "rgba(255,200,80,0.9)" }}>σ = 0.5</span> = critical line; try<br />
              σ ≠ 0.5 to test off-line behavior
            </div>
          </div>
          <div style={{ marginTop: "12px", padding: "8px", background: "rgba(79,195,247,0.05)", borderLeft: "2px solid rgba(79,195,247,0.3)", fontSize: "10px", color: "rgba(255,255,255,0.4)" }}>
            N=200, β=0.5, σ=0.5 is the dimensional-analysis motivated baseline. Increase N for sharper minima.
          </div>
        </div>
      </div>
    </div>
  );
}
`;
        
        try {
            // Pre-processing
            let codeToTransform = jsxCode
                .replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '')
                .replace(/import\s+.*?['"];?/g, '')
                .replace(/export\s+default\s+/g, 'var __export_default__ = ')
                .replace(/export\s+/g, '');

            const { code } = Babel.transform(codeToTransform, {
                presets: ['react'],
            });

            const scopeKeys = Object.keys(React).filter(k => k !== 'version');
            
            const funcBody = `
                const { ${scopeKeys.join(', ')} } = React;
                ${code}
                if (typeof __export_default__ !== 'undefined') return __export_default__;
                return null;
            `;

            const executeCode = new Function('React', funcBody);
            let Component = executeCode(React);
            
            if (!Component) {
                 try {
                     const simpleBody = `
                        const { ${scopeKeys.join(', ')} } = React;
                        return ${code}
                     `;
                     Component = new Function('React', simpleBody)(React);
                 } catch (e) {}
            }

            if (Component) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                if (typeof Component === 'function') {
                    root.render(React.createElement(Component));
                } else if (React.isValidElement(Component)) {
                    root.render(Component);
                }
            } else {
                document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">No component returned to render. Ensure you have an export default or return statement.</div>';
            }
        } catch (err) {
            console.error(err);
            document.getElementById('root').innerHTML = '<pre style="padding: 20px; color: red">' + err.toString() + '</pre>';
        }
    </script>
</body>
</html>
